name: Build registry index

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 min (filet ; le déclenchement instantané passe par REGISTRY_DISPATCH_TOKEN côté repos de mods)
  workflow_dispatch:       # bouton manuel
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/blocklist.txt"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-index
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC: brokeprotocol-mod
        run: |
          node scripts/build-index.js

      - name: Validate index
        run: |
          node -e "JSON.parse(require('fs').readFileSync('public/index.json','utf8'))"
          echo "index.json valide"

      - name: Upload artifact (Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
